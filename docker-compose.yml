services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novel_password}
      POSTGRES_DB: ${POSTGRES_DB:-novel_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novel}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novel-net

  redis:
    image: redis:7-bookworm
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novel-net

  nats:
    image: nats:2.10
    command: [ "-js", "-sd", "/data" ]
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: [ "CMD", "nats-server", "--signal", "ldm" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novel-net

  meilisearch:
    image: getmeili/meilisearch:v1.7
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-novel_meili_master_key_change_in_production}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novel-net

  novel-api:
    build:
      context: ./novel-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD:-novel_password}@postgres:5432/${POSTGRES_DB:-novel_platform}
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-novel_meili_master_key_change_in_production}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_string_in_production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      RUST_LOG: ${RUST_LOG:-novel_api=info,tower_http=info}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - novel-net

  novel-workers:
    build:
      context: ./novel-workers
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD:-novel_password}@postgres:5432/${POSTGRES_DB:-novel_platform}
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-novel_meili_master_key_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - novel-net

  nginx:
    image: nginx:1.25-bookworm
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      novel-api:
        condition: service_healthy
    networks:
      - novel-net

volumes:
  postgres_data:
  redis_data:
  nats_data:
  meili_data:
  nginx_cache:


networks:
  novel-net:
    driver: bridge
